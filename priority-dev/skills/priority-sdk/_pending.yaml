    pattern_name: UPLOAD built-in step with :$.FFL variable
    pattern_signature: proc-step-upload-ffl
    evidence:
      metadata_table: PROG + PROGTEXT (EPROG.PROG POS=10 and POS=15)
      snippet: |
        /* POS=10 SQLI step sets up file path */
        :FROMFILE = STRCAT(SYSPATH('LOAD'), 'orders.doc');
        :$.FFL = :FROMFILE;
        :TOFILE = STRCAT(SYSPATH('LOAD'), 'LOADORDERS');
        /* POS=15 UPLOAD built-in step */
        ENAME=UPLOAD, ETYPE=B
        PROGPARAM: NAME=FFL, TYPE=CHAR
    proposed_edit:
      target: references/procedures.md §Built-in Steps
      diff: |
        ### UPLOAD step
        `ENAME=UPLOAD, ETYPE=B` uploads a file from client to server.
        The server destination path is passed via PROGPARAM `FFL` (CHAR).
        The preceding SQLI step must set `:$.FFL` (procedure global scope):
          :FROMFILE = STRCAT(SYSPATH('LOAD'), 'myfile.doc');
          :$.FFL = :FROMFILE;
        The `:$.` prefix addresses the procedure's global parameter namespace,
        bridging a SQLI step variable into a built-in step's parameter.
    notes: >
      The :$.FFL scoping convention is completely undocumented. SYSPATH('LOAD')
      is also missing from skill docs. Both are needed for any file-upload
      procedure step and appear consistently in this and related entities.
