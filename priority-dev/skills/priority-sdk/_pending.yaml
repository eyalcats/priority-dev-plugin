    pattern_name: Linking a custom menu under a system parent uses TAKEMENULINK with ENAME=PARENT_MODULE, not TAKEDIRECTACT
    pattern_signature: upgrades-takemenulink-parent-module-naming-convention
    evidence:
      metadata_table: transcript
      snippet: |
        Round 4 builder agent added UPGNOTES row:
          UPGCODE='TAKEDIRECTACT', ENAME='SYSMAINTEN'
        Result: bridge timeout from CHECK-FIELD trigger loading entire SYSMAINTEN menu.
        User correction: correct shape is
          UPGCODE='TAKEMENULINK', ENAME='SYSMAINTEN_MODULE',
          SONENAME='<child menu name>', SONTYPE='M'
        After correction TAKEUPGRADE ran and produced a new shell URL successfully.
        TAKEMENULINK is listed in debugging.md line 333 as "Linkage of a menu item
        to its menu" — no example, no ENAME convention, no SONTYPE documented.
    proposed_edit:
      target: references/debugging.md §UPGCODE table §Menu link pattern
      diff: |
        To deploy a custom menu as a child of an existing system menu
        (e.g., under System Management, System Data, etc.), add an UPGNOTES entry:
        | Field | Value |
        |-------|-------|
        | UPGCODE | `TAKEMENULINK` |
        | ENAME | `<PARENT_MENU>_MODULE` (see table below) |
        | SONENAME | `<child menu name>` |
        | SONTYPE | `M` |
        | BOUND | `Y` |
        **Common parent menu ENAME values:**
        | System menu | ENAME to use |
        |------------|--------------|
        | System Management | `SYSMAINTEN_MODULE` |
        | System Data | `SYSDATA_MODULE` |
        The canonical naming pattern is `<PARENT_MENU_NAME>_MODULE`. Using the
        plain parent menu name (e.g., `SYSMAINTEN` without `_MODULE`) triggers the
        form's CHECK-FIELD trigger, which loads the entire menu tree and causes a
        bridge timeout.
        **Do NOT use `TAKEDIRECTACT` for menu-to-submenu links.** `TAKEDIRECTACT`
        is for "a form has a direct activation calling a procedure" — it is a
        different concept and will fail or timeout when applied to menu linkage.
        Example UPGNOTES sequence for a new menu under System Management:
        ```
        ORD=1  UPGCODE=TAKESINGLEENT  ENAME=TGML_MYMENU  TYPE=M  BOUND=Y
        ORD=2  UPGCODE=TAKEMENULINK   ENAME=SYSMAINTEN_MODULE  SONENAME=TGML_MYMENU  SONTYPE=M  BOUND=Y
        ```
        The TAKESINGLEENT for the child menu must appear before the TAKEMENULINK.
    notes: |
      TAKEMENULINK is listed in the UPGCODE table with no usage guidance. Any
      developer deploying a custom menu to a system parent will attempt TAKEDIRECTACT
      or the bare parent name first — both fail. The PARENT_MODULE naming convention
      is non-obvious and not documented anywhere in the skill. This pattern applies
      to every custom menu deployment against any system-owned parent menu.
