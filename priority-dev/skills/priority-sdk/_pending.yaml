    pattern_name: DAYOFWEEK, LENGTH(), ASCII() do not exist in Priority SQLI — use DAY(), STRLEN(), DTOA()
    pattern_signature: sqli-missing-functions-dayofweek-length-ascii
    evidence:
      metadata_table: transcript
      snippet: |
        Attempted: DAYOFWEEK(:D) → parse error at "("
        Attempted: LENGTH(:S) → parse error at "("
        Attempted: ASCII('א') → parse error at "("
        Working alternatives:
          - Day of week integer: DAY(date) — returns 1=Sun, 2=Mon, ..., 7=Sat
          - String length: STRLEN(string)
          - Hebrew weekday letter (Hebrew install): DTOA(date, 'day') returns 'א','ב',... etc.
    proposed_edit:
      target: references/sql-core.md §String Functions and §Date Functions
      diff: |
        | Function developers expect | Priority SQLI equivalent |
        |---------------------------|--------------------------|
        | `DAYOFWEEK(date)` | `DAY(date)` — returns 1=Sun, 2=Mon, ..., 7=Sat |
        | `LENGTH(string)` | `STRLEN(string)` |
        | `ASCII(char)` | No direct equivalent — use integer math or `DTOA` for display |
        | `CHARINDEX(sub, str)` | `STRINDEX(str, sub, 1)` |
        | `ISNULL(x, y)` | `(x = '' ? y : x)` or `(x = 0 ? y : x)` |
        On Hebrew installs, `DTOA(date, 'day')` returns the Hebrew weekday abbreviation
        letter (e.g., 'א' for Sunday). To avoid RTL source-code issues, prefer integer
        day-of-week arithmetic using `DAY()` (see i18n-rtl-warnings note).
    notes: |
      These are common parse errors that produce unhelpful error messages. Explicitly
      listing the non-existent function names prevents repeated trial-and-error when
      porting SQL logic from other databases.
  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567804
    added_at: "2026-05-02T00:00:00Z"
