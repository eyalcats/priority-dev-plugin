    pattern_name: priority.prepareForm WCF call returns false-positive on system forms
    pattern_signature: prepareform-wcf-false-positive-system-form
    evidence:
      metadata_table: (tooling)
      snippet: |
        Verified 2026-05-06 on ORDERITEMS:
          run_windbi_command("priority.prepareForm", entityName="ORDERITEMS")
            → "Compilation completed", messages=[]
          immediately after:
          websdk_form_action({form: "ORDERITEMS", operations: [{op: "filter", ...}, {op: "getRows", ...}]})
            → "The form is unprepared. To prepare it, run the Form Preparation program."
        SQLI alternatives also no-op (return "Execution ok" without effect):
          EXECUTE FORMPREP;
          EXECUTE FORMPREPDRCT 'ORDERITEMS';
          EXECUTE FORMPREPDRCT2;
        Only the Priority UI Form Generator "Prepare Form" / "Reprepare Form" Action
        actually rebuilds the runtime form-bin on this server.
    proposed_edit:
      target: references/debugging.md §Claude Code MCP Integration
      diff: |
        **Verified 2026-05-06 on lp1378:** the `priority.prepareForm` WINDBI command
        returns `"Compilation completed"` with empty messages on system forms (e.g.,
        ORDERITEMS) but the runtime form-bin is NOT actually rebuilt — subsequent
        WebSDK `getRows` calls still error with `"The form is unprepared"`. SQLI
        `EXECUTE FORMPREP`, `EXECUTE FORMPREPDRCT '<form>'`, and `EXECUTE FORMPREPDRCT2`
        also return OK without effect.
        **The only reliable path on this server**: Priority UI Form Generator →
        select form → "Prepare Form" or "Reprepare Form" Action.
        Practical implication: after any metadata change to a heavily-joined system form
        (ORDERITEMS, PORDERITEMS, PART, etc.) the user must trigger UI prepare manually
        before validating via WebSDK. Bots cannot self-validate the prepare step on
        system forms.
    notes: |
      This caveat invalidated hours of "still duplicates" reports because every test was
      against a stale form-bin from before any of my fixes had landed at runtime. Worth
      surfacing prominently — wasted significant debugging time chasing wrong hypotheses.
  - id: a7b8c9d0
    added_at: "2026-05-06T16:00:00Z"
    source_mode: continuous
    source_ref: tgml-phase2-cartesian-debug-2026-05-06
    classification: partial
    pattern_name: Calc col flag is FCLMN.EXPRESSION='Y', not TYPE='S'
    pattern_signature: fclmn-calc-col-flag-expression
    evidence:
      metadata_table: FORMCLMNS + FORMCLMNSA
      snippet: |
        Working calc col on ORDERITEMS form (verified by Task 2.2.9 builder, 2026-05-06):
          FORMCLMNS row:
            NAME = 'TGML_COSTPCT'
            EXPRESSION = 'Y'    <-- flag is here
            COLUMN = 0          <-- 0 because no physical column backs it
            READONLY = 'R'
            WIDTH = 8
            DEC = 2
          FORMCLMNSA row (sub-form):
            NAME = 'TGML_COSTPCT'
            TYPE = 'REAL'       <-- TYPE='REAL' not 'S'
            EXPR = ':$.PRICE / :$.PURCHASEPRICE'
        Task 2.2.6 builder also confirmed: setting TYPE='S' on FCLMN was rejected by
        Priority's save validation; setting EXPRESSION='Y' is the actual flag.
    proposed_edit:
      target: references/websdk-cookbook.md §Calculated Column Recipe
      diff: |
        Two-row pattern: FCLMN row marks the column as expression; FCLMNSA row holds
        the body.
        ```
        EFORM > <form> > FCLMN > newRow
          NAME = '<col-name>'
          EXPRESSION = 'Y'        # ← flag (NOT TYPE='S' — that's wrong terminology)
          READONLY = 'R'          # typical for derived/calc cols
          WIDTH, DEC = sized for expected output
          COLUMN, IDCOLUMN = 0    # 0 because no underlying physical column
        saveRow
        EFORM > <form> > FCLMN > <col-name> > FCLMNSA > newRow
          TYPE = 'REAL' | 'INT' | 'CHAR' | 'DATE'
          EXPR = ':$.A + :$.B'    # ≤ 56 chars
        saveRow
        ```
        Common errors:
        - `TYPE='S'` on FCLMN row → form save rejects.
        - EXPRESSION='Y' on FCLMN but no FCLMNSA row → compile produces broken column
          with NULL values.
        - FCLMNSA row but EXPRESSION='' on FCLMN → orphaned expression, ignored at
          compile but cluttering metadata.
    notes: |
      Multiple builders in this session got the flag terminology wrong (used TYPE='S').
      Worth a prominent worked example at the head of the calc-col section.
