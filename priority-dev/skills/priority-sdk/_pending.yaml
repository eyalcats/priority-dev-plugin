    pattern_name: Priority SQLI has no WHILE, IF/ELIF/END IF, or END LOOP — only LABEL/LOOP/GOTO
    pattern_signature: sqli-flow-control-no-while-no-if
    evidence:
      metadata_table: transcript
      snippet: |
        Spec §5.5 used: WHILE :D <= :PAR2 LOOP ... END LOOP
        Result: parse error on WHILE keyword.
        Also attempted: IF :X = 1 THEN ... END IF → parse error.
        Only valid loop construct: LABEL N; ... LOOP N WHERE condition;
        Only valid conditional: (cond ? a : b) ternary, or GOTO/LOOP with WHERE clause.
        NOTE: SKILL.md Quick Reference currently states
        "Flow control: GOTO, LABEL, IF...THEN...ELSE, WHILE...LOOP...END"
        — this is incorrect. Priority SQLI has no IF/THEN/ELSE or WHILE keywords.
    proposed_edit:
      target: references/sql-core.md §Flow Control §Commands
      diff: |
        **These constructs do NOT exist in Priority SQLI and will produce parse errors:**
        | Standard SQL / PL-SQL construct | Priority equivalent |
        |---------------------------------|---------------------|
        | `WHILE cond LOOP ... END LOOP` | `LABEL N; ... LOOP N WHERE cond;` |
        | `IF cond THEN ... END IF` | `GOTO skip WHERE NOT cond; ... LABEL skip;` |
        | `IF/ELSIF/ELSE` | Nested GOTO/LABEL chains or ternary `(cond ? a : b)` |
        | `FOR i IN 1..N LOOP` | DECLARE cursor over generated range + FETCH loop |
        The ternary expression `(condition ? value_if_true : value_if_false)` is the
        only inline conditional. All branching beyond that uses GOTO/LOOP/LABEL with
        optional WHERE clauses.
    notes: |
      This is a hard parse error that blocks compilation. Any developer coming from
      PL/SQL or T-SQL will instinctively reach for WHILE or IF; the skill must call
      out the absence explicitly. Also corrects misleading text in SKILL.md Quick
      Reference which lists "IF...THEN...ELSE, WHILE...LOOP...END" as valid constructs.
