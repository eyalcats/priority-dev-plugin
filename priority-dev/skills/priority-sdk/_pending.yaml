    classification: partial
    pattern_name: "Priority date arithmetic — add days with +24:00 not +1"
    pattern_signature: sqli-date-arithmetic-24h-not-plus-1
    evidence:
      metadata_table: transcript
      snippet: |
        Loop over dates: :CURD = :CURD + 1 — left date unchanged (incremented time
        component from 0 to 1 internal time unit, not a day).
        Fix: :CURD = :CURD + 24:00 — correctly advances by exactly 1 day.
        DATE type stores date+time as a single integer where 24:00 = 1 day.
    proposed_edit:
      target: references/sql-core.md §Date Functions
      diff: |
        **Date columns store date+time as a combined integer. Adding `1` advances by
        one internal time unit (one minute or one second depending on precision), NOT
        by one day.**
        ```sql
        /* WRONG — :D advances by 1 time-unit, not 1 day */
        :D = :D + 1;
        /* CORRECT — advances by exactly 1 day */
        :D = :D + 24:00;
        /* Multi-day steps */
        :D = :D + 72:00;   /* +3 days */
        :D = :D + 168:00;  /* +7 days (1 week) */
        ```
        This applies in date-stepping loops, expiry calculations, and any arithmetic
        on DATE-type variables or columns. The `MOD 24:00` pattern extracts the time
        component from a DATE14 value (already documented above).
    notes: |
      `:CURD + 1` silently produces wrong results — the date looks unchanged visually
      in most displays. This is a durable trap for any date-loop procedure and needs
      to be called out as a rule, not just in an example.
  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567806
    added_at: "2026-05-02T00:00:00Z"
    source_mode: continuous
    source_ref: session-2026-05-02-tgml-phase1
    classification: partial
    pattern_name: ":$.PARAM with 0+ type coercion is the canonical procedure-parameter access pattern"
    pattern_signature: procedure-param-dollar-coercion-canonical
    evidence:
      metadata_table: transcript
      snippet: |
        Dump of UPDATESALESRATEPER body lines 1-2:
          :FPR = 0 + :$.FPR;
          :TPR = 0 + :$.TPR;
        The 0+ coercion forces the variable to INT/DATE/TIME type (matches the
        declared parameter type) AND silences the static "Unresolved identifier"
        compiler warning that fires when :$.PARAM is used without a type context.
        Without 0+, a DATE parameter accessed as :$.FDT resolves as CHAR type
        and date comparisons silently fail.
    proposed_edit:
      target: references/procedures.md §Procedure Step Queries §Parameter Variables
      diff: |
        Always copy procedure parameters into typed local variables at the top of
        each SQLI step body using the `0 +` (or `0.0 +`) type coercion:
        ```sql
        /* INT or DATE parameters — use 0 + */
        :FDT = 0 + :$.FDT;
        :TDT = 0 + :$.TDT;
        :QTY = 0 + :$.QTY;
        /* REAL parameters — use 0.0 + */
        :RATE = 0.0 + :$.RATE;
        /* CHAR parameters — no coercion needed (CHAR is the default type) */
        :CUST = :$.CUST;
        ```
        **Why this is necessary:**
        1. `:$.PARAM` without a type context resolves as `CHAR` regardless of the
           declared parameter type — date/numeric comparisons then silently fail.
        2. `0 +` forces the variable to `INT`/`DATE`/`TIME` type (matching the
           declaration) AND suppresses the static "Unresolved identifier" warning
           for variables not yet defined in the current step context.
        This pattern is used in all Priority system procedures (verified against
        `UPDATESALESRATEPER`, `INTEREST`, `CASHINVOICES` bodies).
    notes: |
      Without this pattern, numeric/date procedure parameters are silently treated
      as CHAR strings, causing wrong comparisons and date arithmetic failures. The
      existing docs describe :$.PARAM syntax but do not explain the type-coercion
      requirement or the "Unresolved identifier" suppression benefit.
